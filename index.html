<head>

    <!-- Firebase SDK (For Portfolio DB Integration) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAP9A5A9c2T5weGZqctuiDAOCt2ztqJtMc",

            projectId: "sost-portfolio",

            messagingSenderId: "108168561697",
            appId: "1:108168561697:web:43bc1bc833eb4b155b0f60"
        };
        const app = initializeApp(firebaseConfig);
        window.firebaseApp = { db: getFirestore(app), collection, getDocs, orderBy, query, limit };

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = React.useRef();
            React.useEffect(() => {
                if(ref.current) {
                    ref.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    if(className) i.className = className;
                    i.style.width = size + 'px';
                    i.style.height = size + 'px';
                    ref.current.appendChild(i);
                    lucide.createIcons({ root: ref.current });
                }
            }, [name, size, className]);
            return <span ref={ref} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}></span>;
        };

        function SostLanding() {
            const [scrolled, setScrolled] = useState(false);
            const [projects, setProjects] = useState([]);

            useEffect(() => {
                AOS.init({ duration: 800, once: true, offset: 50 });
                lucide.createIcons();

                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Firebase 연동 (라이브 서버 데이터 호출)
            useEffect(() => {
                async function fetchPortfolio() {
                    if(!window.firebaseApp) return;
                    const { db, collection, getDocs, orderBy, query, limit } = window.firebaseApp;
                    try {
                        const q = query(collection(db, "portfolio"), orderBy("createdAt", "desc"), limit(4));
                        const snap = await getDocs(q);
                        const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        if(data.length > 0) {
                            setProjects(data);
                        } else {
                            // 등록된 데이터가 없을 경우 나오는 안내 데모 이미지
                            setProjects([
                                { id: 'demo1', title: '시청 예산과 비디오월 구축', desc: '통합관제센터용 초정밀 멀티비전 디스플레이 설치 및 네트워크 연동', imgUrl: './sost-img06.png' },
                                { id: 'demo2', title: '구청 스마트 고시공고 전광판', desc: '주야간 완벽 시인성을 자랑하는 옥외형 스마트 안내시스템', imgUrl: './sost-img07.png' },
                                { id: 'demo3', title: '관공서 로비 웰컴 디스플레이', desc: '청사 홍보 및 민원인 안내를 위한 프리미엄 디지털 사이니지', imgUrl: './sost-img08.png' }
                            ]);
                        }
                    } catch (e) {
                        console.error('Firebase Error:', e);
                        setProjects([
                            { id: 'err', title: '데모 모드', desc: '데이터베이스 연결이 비활성화 되어 기본 화면이 표출됩니다.', imgUrl: './sost-img06.png' }
                        ]);
                    }
                }
                setTimeout(fetchPortfolio, 300); // SDK 로드 지연 기다림
            }, []);

            return (
                <div className="min-h-screen font-sans">
                    {/* Header */}

                                <a href="#portfolio" className="hover:text-brand-400 transition">설치사례 (포토게시판)</a>
                                <a href="#contact" className="hover:text-brand-400 transition">견적상담</a>
                            </nav>

                            <a href="tel:010-3210-1777" className="bg-brand-600 hover:bg-brand-500 text-white px-5 py-2.5 rounded-full font-bold text-sm transition-all shadow-lg active:scale-95 flex items-center gap-2">
                                <Icon name="phone" size={16} /> 전화상담
                            </a>
                        </div>
                    </header>

                    {/* Hero */}
                    <section className="pt-40 pb-32 px-5 relative hero-gradient min-h-[90vh] flex items-center">

                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-16 items-center flex-1">
                            <div data-aos="fade-right">

                                    <Icon name="monitor" size={16} /> Digital Display Solutions
                                </div>
                                <h1 className="text-5xl sm:text-7xl font-black text-white leading-[1.15] mb-8 tracking-tight break-keep">

                                    극대화하는 <span className="text-transparent bg-clip-text bg-gradient-to-r from-brand-400 to-cyan-300">멀티비전</span>
                                </h1>
                                <p className="text-slate-400 text-lg sm:text-xl leading-relaxed mb-12 font-medium break-keep">

                                </p>

                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                                <h2 className="text-4xl font-black text-white mb-6 tracking-tight">주요 사업 영역</h2>

                            </div>
                            
                            <div className="grid md:grid-cols-3 gap-8">
                                {[
                                    {icon: 'monitor-play', title: '멀티비전 (비디오월)', desc: '상황실, 관제센터, 로비 등을 위한 베젤리스 초대형 멀티스크린 구축'},
                                    {icon: 'cpu', title: '스마트 전자 게시대', desc: '관공서 및 구청용 고시공고 시스템, 고해상도 아웃도어 LED 및 키오스크'},
                                    {icon: 'cast', title: '디지털 사이니지', desc: '메뉴보드, 사내 공지용 DID, 상업 공간의 투명/커브드 디스플레이 설계'}
                                ].map((srv, i) => (
                                    <div key={i} data-aos="fade-up" data-aos-delay={i*100} className="bg-slate-900/50 p-10 rounded-[2rem] border border-slate-800 hover:border-brand-500/50 transition-all group">
                                        <div className="w-16 h-16 bg-slate-800 text-brand-400 rounded-2xl flex items-center justify-center mb-8 group-hover:scale-110 group-hover:bg-brand-500 group-hover:text-white transition-all shadow-lg">
                                            <Icon name={srv.icon} size={32} />

                                        <p className="text-slate-400 leading-relaxed font-medium break-keep">{srv.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Products Lineup Section */}
                    <section id="products" className="py-32 px-5 bg-slate-900 border-t border-slate-800 relative shadow-inner">
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center mb-20" data-aos="fade-up">
                                <h2 className="text-4xl font-black text-white mb-6 tracking-tight">주요 제품 안내</h2>

                            </div>
                            
                            <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                {[
                                    {img: './sost-img02.png', title: '통합 관제실 비디오월', subtitle: '초슬림 베젤로 경계선 없는 압도적 대형 화면 구축'},
                                    {img: './sost-img03.png', title: '옥외형 고휘도 전광판', subtitle: '극한의 날씨와 직사광선에도 끄떡없는 아웃도어 LED'},
                                    {img: './sost-img05.png', title: '공공기관 터치 키오스크', subtitle: '사용자 친화적 UI를 탑재한 맞춤형 민원 안내 시스템'}

                    {/* Portfolio / Photo Board */}

                                </div>
                                <a href="admin.html" className="hidden md:inline-flex items-center gap-2 text-slate-500 hover:text-white text-sm font-bold bg-slate-950 px-4 py-2 rounded-xl border border-slate-800 transition">

                                            <img src={item.imgUrl} alt={item.title} className="w-full h-full object-cover group-hover:scale-110 transition duration-700 ease-out" />
                                            {/* 마우스오버 전에도 로고가 살짝 보이게 뱃지 배치 */}

                    {/* Contact Section */}

                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-16">
