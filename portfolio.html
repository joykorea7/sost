<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOST - 포토 설치 사례</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { 400: '#22d3ee', 500: '#06b6d4', 600: '#0891b2' } } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAP9A5A9c2T5weGZqctuiDAOCt2ztqJtMc",
            authDomain: "sost-portfolio.firebaseapp.com",
            projectId: "sost-portfolio",
            storageBucket: "sost-portfolio.firebasestorage.app",
            messagingSenderId: "108168561697",
            appId: "1:108168561697:web:43bc1bc833eb4b155b0f60"
        };
        const app = initializeApp(firebaseConfig);
        window.firebaseApp = { db: getFirestore(app), collection, getDocs, orderBy, query };
    </script>

    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-nav { background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = React.useRef();
            React.useEffect(() => {
                if(ref.current) {
                    ref.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    if(className) i.className = className;
                    i.style.width = size + 'px';
                    i.style.height = size + 'px';
                    ref.current.appendChild(i);
                    lucide.createIcons({ root: ref.current });
                }
            }, [name, size, className]);
            return <span ref={ref} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}></span>;
        };

        function PortfolioPage() {
            const [projects, setProjects] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                lucide.createIcons();
                
                async function fetchProjects() {
                    try {
                        if(!window.firebaseApp) return;
                        const { db, collection, getDocs, orderBy, query } = window.firebaseApp;
                        const q = query(collection(db, "portfolio"), orderBy("createdAt", "desc"));
                        const snap = await getDocs(q);
                        const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setProjects(data);
                    } catch (e) {
                        console.error('Firebase DB Error:', e);
                    } finally {
                        setLoading(false);
                    }
                }

                setTimeout(fetchProjects, 500); // 모듈 로딩 대기
            }, []);

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="fixed top-0 w-full z-50 glass-nav py-4 shadow-xl">
                        <div className="max-w-7xl mx-auto px-5 flex items-center justify-between">
                            <a href="index.html" className="text-2xl sm:text-3xl font-black text-white flex items-center gap-2">
                                <span className="bg-brand-500 text-slate-950 px-2 py-0.5 rounded uppercase italic">SOST</span>
                                <span>소스트</span>
                            </a>
                            <a href="index.html" className="text-slate-400 font-bold hover:text-white flex items-center gap-2 transition">
                                <Icon name="arrow-left" size={16} /> 메인으로 돌아가기
                            </a>
                        </div>
                    </header>

                    {/* Page Title */}
                    <section className="pt-40 pb-20 px-5 relative border-b border-slate-900 bg-slate-950">
                        <div className="max-w-7xl mx-auto text-center">
                            <h1 className="text-4xl md:text-6xl font-black text-white mb-6">포토 설치 사례</h1>
                            <p className="text-slate-400 text-lg md:text-xl font-medium">SOST의 기본 구성 및 커스터마이징 프로젝트를 확인하세요.</p>
                        </div>
                    </section>

                    {/* Gallery Grid */}
                    <section className="py-20 px-5 relative min-h-[50vh]">
                        <div className="max-w-7xl mx-auto">
                            {loading ? (
                                <div className="text-center py-20 text-brand-500 flex flex-col items-center justify-center">
                                    <Icon name="loader-2" size={40} className="animate-spin mb-4" />
                                    <p className="text-slate-400 font-bold">포트폴리오 영상/사진을 불러오는 중입니다...</p>
                                </div>
                            ) : (
                                <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {projects.map(p => (
                                        <div key={p.id} className="bg-slate-900 rounded-3xl overflow-hidden border border-slate-800 shadow-xl group hover:border-brand-500 transition-all flex flex-col">
                                            <div className="aspect-[4/3] w-full overflow-hidden bg-slate-950 border-b border-slate-800">
                                                <img src={p.imgUrl} alt={p.title} className="w-full h-full object-cover group-hover:scale-110 transition duration-700 ease-out" />
                                            </div>
                                            <div className="p-8 flex flex-col flex-1">
                                                <p className="text-brand-400 text-xs font-black tracking-widest uppercase mb-3 flex items-center gap-2"><Icon name="check-circle" size={12}/> Completed</p>
                                                <h3 className="text-xl font-black text-white mb-3 tracking-tight">{p.title}</h3>
                                                <p className="text-slate-400 text-sm leading-relaxed font-medium break-keep mt-auto">{p.desc}</p>
                                            </div>
                                        </div>
                                    ))}
                                    {projects.length === 0 && (
                                        <div className="col-span-full text-center py-32 bg-slate-900/30 rounded-3xl border border-slate-800 border-dashed">
                                            <div className="w-16 h-16 bg-slate-800 text-slate-400 rounded-full flex items-center justify-center mx-auto mb-4 font-black"><Icon name="image-off" size={24}/></div>
                                            <p className="text-slate-400 font-bold">아직 서버에 등록된 설치 사례가 없습니다.<br/><a href="admin.html" className="text-brand-400 hover:underline mt-2 inline-block">관리자 페이지</a>에서 사진을 업로드 해주세요.</p>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-slate-950 py-12 px-5 border-t border-slate-900 mt-20">
                        <div className="max-w-7xl mx-auto text-center text-slate-500 text-sm font-medium">
                            <div className="text-xl font-black text-slate-400 tracking-widest uppercase flex items-center justify-center gap-2 mb-4">
                                <Icon name="monitor" className="text-brand-500" /> SOST
                            </div>
                            &copy; 2026 SOST INC. ALL RIGHTS RESERVED.
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PortfolioPage />);
    </script>
</body>
</html>
